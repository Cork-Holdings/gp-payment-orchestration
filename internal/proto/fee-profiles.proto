
syntax = "proto3";

package fee_profiles;


option go_package = "/proto/fee_profiles;fee_profiles";


message CreateFeeProfileRequest {
    string name = 1;
    string code = 2;
    string payment_channel_id = 3;
    string transaction_type_id = 4;
    string sub_transaction_type_id = 5;
    string status = 6;
    string charge_amount = 7;
    string approval_status = 8;
    string approved_by = 9;
    string approved_at = 10;
    string rejected_by = 11;
    string rejected_reason = 13;
}


message FeeProfile {
    string name = 1;
    string code = 2;
    string payment_channel_id = 3;
    string transaction_type_id = 4;
    string sub_transaction_type_id = 5;
    string status = 6;
    string charge_amount = 7;
    string approval_status = 8;
    string approved_by = 9;
    string approved_at = 10;
    string rejected_by = 11;
    string rejected_reason = 13;
}


message GetFeeProfilesRequest {
    int32 page =1;
    int32 pageSize =2;
    string searchQuery=3;
}

message GetFeeProfilesResponse {
    repeated FeeProfile fee_profile = 1;       // List of fee profiles
    int32 totalPages = 2;         // Total number of pages
    int32 currentPage = 3;        // Current page
    bool hasMore = 4;             // Whether there are more pages
  }

message EditFeeProfileRequest {
    string name = 1;
    string code = 2;
    string payment_channel_id = 3;
    string transaction_type_id = 4;
    string sub_transaction_type_id = 5;
    string status = 6;
    string charge_amount = 7;
    string approval_status = 8;
    string approved_by = 9;
    string approved_at = 10;
    string rejected_by = 11;
    string rejected_reason = 12;
    string id = 13;
}

