syntax = "proto3";

package channel_fee_bands_proto;


option go_package = "/proto/channel_fee_bands_proto;channel_fee_bands_proto";


message CreateChannelFeeBandRequest {
    string name = 1;
    string status = 2;
    string payment_channel_id = 3;
    string min_amount = 4;
    string max_amount = 5;
    string charge_amount = 6;
}

message ChannelFeeBands {
    string name = 1;
    string status = 2;
    string payment_channel_id = 3;
    string min_amount = 4;
    string max_amount = 5;
    string charge_amount = 6;
    string id = 7;
    string created_at = 8;
    string updated_at = 9;
    string payment_channel_name = 10;
}


message GetChannelFeeBandsRequest {
    int32 page =1;
    int32 page_size =2;
    string search_query =3;
}

message GetChannelFeeBandsResponse {
    repeated ChannelFeeBands channel_fee_bands = 1;       // List of channel fee bands
    int32 total_pages = 2;         // Total number of pages
    int32 current_page = 3;        // Current page
    bool has_more = 4;             // Whether there are more pages
  }

message EditChannelFeeBandsRequest {
    string name = 1;
    string payment_channel_id = 2;
    string min_amount = 3;
    string max_amount = 4;
    string charge_amount = 5;
    string status = 6;
    string id = 7;
}
