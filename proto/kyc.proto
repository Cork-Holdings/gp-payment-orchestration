syntax = "proto3";

package kyc;

option go_package = "github.com/Cork-Holdings/gp_payment_orchestration/proto/kycpb";

service KYCService {
  rpc UploadKYCDocument (UploadDocumentRequest) returns (UploadDocumentResponse);
  rpc GetKYCStatus (KYCStatusRequest) returns (KYCStatusResponse);
  rpc PerformAMLScan (AMLScanRequest) returns (AMLScanResponse);
}

message UploadDocumentRequest {
  string tenant_id = 1;
  string document_type = 2; // e.g. PASSPORT, INC_CERT
  string document_url = 3;
}

message UploadDocumentResponse {
  string document_id = 1;
  string tenant_id = 2;
  string status = 3; // e.g. UPLOADED, SCANNING, VERIFIED
}

message KYCStatusRequest {
  string tenant_id = 1;
}

message KYCStatusResponse {
  string tenant_id = 1;
  string status = 2; // e.g. PENDING, APPROVED, REJECTED
  string last_updated = 3;
}

message AMLScanRequest {
  string target_name = 1;
  string target_type = 2; // e.g. INDIVIDUAL, ENTITY
}

message AMLScanResponse {
  string scan_id = 1;
  string result = 2; // e.g. PASSED, FLAGGED
  double match_score = 3;
}
