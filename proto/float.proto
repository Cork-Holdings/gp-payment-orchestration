syntax = "proto3";

package float;

option go_package = "github.com/Cork-Holdings/gp_payment_orchestration/proto/floatpb";

service FloatService {
  rpc RequestFloat (FloatRequest) returns (FloatResponse);
  rpc ApproveFloat (ApproveFloatRequest) returns (FloatResponse);
  rpc GetFloatBalance (FloatBalanceRequest) returns (FloatBalanceResponse);
}

message FloatRequest {
  string tenant_id = 1;
  double amount = 2;
  string currency = 3;
  string remarks = 4;
}

message FloatResponse {
  string request_id = 1;
  string tenant_id = 2;
  double amount = 3;
  string currency = 4;
  string status = 5; // e.g. PENDING, APPROVED, REJECTED
  string remarks = 6;
  string created_at = 7;
}

message ApproveFloatRequest {
  string request_id = 1;
  string approver_id = 2;
}

message FloatBalanceRequest {
  string tenant_id = 1;
}

message FloatBalanceResponse {
  string tenant_id = 1;
  double balance = 2;
  string currency = 3;
}
